<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="G-WORLD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">

<title>G-WORLD</title>

<link rel="icon" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">

<link rel="stylesheet" href="./styles/base.css">

<body>

<!-- ヘッダー -->
<header class="header">
  <h1>G-WORLD<span class="sub">PORTAL</span></h1>
  <div class="header-info">
    <div id="header-name"></div>
  </div>
</header>

<!-- メインコンテナ：Routerが各画面を描画する -->
<main id="app-root" class="container">
  <div class="boot-placeholder">
    <div class="boot-spinner"></div>
    <div class="boot-text">G-WORLD 起動中...</div>
    <div class="boot-sub">画面モジュールを読み込んでいます</div>
  </div>
</main>

<!-- フッターナビ -->
<nav class="footer-nav">
  <button data-route="home">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">ホーム</span>
  </button>
  <button data-route="gland">
    <span class="nav-icon">⛳</span>
    <span class="nav-label">G-LAND</span>
  </button>
  <button data-route="mypage">
    <span class="nav-icon">👤</span>
    <span class="nav-label">マイ</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script type="module" src="./scripts/main.js"></script>
