<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a3d2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="G-WORLD">
<title>G-WORLD ⛳ v9</title>
<link rel="icon" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">

<!-- ==========================================================
  G-WORLD v9.0 - カード一体型UI（究極版）
  
  【設計コンセプト】
  - 画面全体が大きなスコアカード（入力専用画面は廃止）
  - セルタップで下からモーダルがにゅるっと出現
  - 編集ロック機能（誤タップ防止）
  - 年配対応の超大型UI（最低56px円形ボタン）
========================================================== -->

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: linear-gradient(180deg, #0a3d2e 0%, #1a4d3e 100%);
  color: #fff; min-height: 100vh;
  padding-bottom: 70px;
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

/* ========== Boot ========== */
.boot {
  position: fixed; inset: 0; z-index: 9999;
  background: #0a3d2e;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.4s;
}
.boot.hidden { opacity: 0; pointer-events: none; }
.boot-spinner {
  width: 50px; height: 50px;
  border: 4px solid rgba(245,200,66,0.2);
  border-top-color: #f5c842;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.boot-title { font-size: 32px; font-weight: 900; color: #f5c842; margin-top: 20px; letter-spacing: 6px; }
.boot-sub { color: rgba(255,255,255,0.6); margin-top: 6px; font-size: 12px; }

/* ========== Header ========== */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,61,46,0.95); backdrop-filter: blur(10px);
  padding: 10px 14px;
  border-bottom: 1px solid rgba(245,200,66,0.2);
  display: flex; justify-content: space-between; align-items: center;
}
header h1 { font-size: 18px; color: #f5c842; letter-spacing: 2px; }
header h1 small { font-size: 10px; color: rgba(255,255,255,0.6); margin-left: 6px; font-weight: 400; }
.header-actions { display: flex; gap: 6px; }
.header-actions button {
  padding: 6px 10px; font-size: 11px; font-weight: 800;
  background: rgba(255,255,255,0.1); color: #f5c842;
  border: 1px solid rgba(245,200,66,0.3); border-radius: 6px;
  cursor: pointer;
}

/* ========== Screens ========== */
main { padding: 12px; max-width: 720px; margin: 0 auto; }
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* ========== Card 共通 ========== */
.card {
  background: rgba(255,255,255,0.08);
  border-radius: 16px; padding: 18px;
  margin-bottom: 14px;
  border: 1px solid rgba(255,255,255,0.1);
}
.card h2 { color: #f5c842; margin-bottom: 8px; font-size: 22px; }
.card p { color: rgba(255,255,255,0.7); font-size: 14px; line-height: 1.6; margin-bottom: 10px; }
.card label { display: block; font-size: 14px; color: rgba(255,255,255,0.8); margin: 12px 0 6px; }
.card input[type="text"] {
  width: 100%; padding: 16px; font-size: 17px;
  background: rgba(255,255,255,0.1); color: #fff;
  border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
  outline: none;
}
.card input[type="text"]:focus { border-color: #f5c842; }

.btn-primary {
  display: block; width: 100%; padding: 18px;
  background: linear-gradient(135deg, #f5c842, #e6a02e);
  color: #0a3d2e;
  font-size: 18px; font-weight: 900;
  border: none; border-radius: 14px; cursor: pointer;
  margin-top: 14px;
}
.btn-primary:active { transform: scale(0.97); }
.btn-secondary {
  display: block; width: 100%; padding: 14px;
  background: rgba(255,255,255,0.15); color: #fff;
  font-size: 15px; font-weight: 700;
  border: none; border-radius: 10px; cursor: pointer;
  margin-top: 10px;
}
.btn-danger { background: #c0392b !important; color: #fff !important; }
.btn-green { background: linear-gradient(135deg, #2ecc71, #27ae60) !important; color: #fff !important; }

/* ========== Home (Portal) ========== */
.hero { text-align: center; padding: 20px 0; }
.hero .greet { font-size: 15px; color: rgba(255,255,255,0.7); }
.hero .name { font-size: 30px; font-weight: 900; color: #f5c842; margin: 4px 0; }
.hero .badge {
  display: inline-block; padding: 5px 14px; font-size: 12px;
  border-radius: 12px; margin-bottom: 16px;
  background: rgba(245,200,66,0.2); color: #f5c842;
}
.hero .badge.guest { background: rgba(255,255,255,0.15); color: #ddd; }
.cta-resume {
  display: block; width: 100%; padding: 18px;
  background: linear-gradient(135deg, #2ecc71, #16a085);
  color: #fff; font-size: 17px; font-weight: 800;
  border: none; border-radius: 14px; cursor: pointer;
  margin-bottom: 10px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
  50% { box-shadow: 0 0 0 12px rgba(46,204,113,0); }
}
.cta-resume small { display: block; font-size: 12px; opacity: 0.9; margin-top: 3px; }
.cta-start {
  display: block; width: 100%; padding: 20px;
  background: linear-gradient(135deg, #f5c842, #e6a02e);
  color: #0a3d2e; font-size: 20px; font-weight: 900;
  border: none; border-radius: 16px; cursor: pointer;
}

.section-label {
  display: flex; align-items: center; gap: 8px;
  margin: 22px 4px 10px; font-size: 13px; font-weight: 800;
  color: rgba(255,255,255,0.85);
}
.section-label .dot { width: 10px; height: 10px; border-radius: 50%; }
.section-label .dot.ready { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
.section-label .dot.soon { background: #9b59b6; box-shadow: 0 0 6px #9b59b6; }

.modules { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.module {
  position: relative; padding: 20px 10px; text-align: center;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px; color: #fff; cursor: pointer;
}
.module.ready { border-color: rgba(46,204,113,0.3); background: linear-gradient(135deg, rgba(46,204,113,0.05), rgba(255,255,255,0.08)); }
.module.soon { opacity: 0.6; border-style: dashed; border-color: rgba(155,89,182,0.5); }
.module .icon { font-size: 38px; }
.module .mname { font-weight: 800; color: #f5c842; margin-top: 4px; font-size: 15px; }
.module .mdesc { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.module .tag {
  position: absolute; top: 6px; right: 6px;
  padding: 2px 6px; font-size: 8px; font-weight: 900; letter-spacing: 1px;
  border-radius: 5px;
}
.module .tag.ready { background: #2ecc71; color: #fff; }
.module .tag.soon { background: #9b59b6; color: #fff; }
.module .lock { position: absolute; top: 6px; left: 6px; font-size: 14px; }

/* ========== Footer Nav ========== */
nav.footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,61,46,0.95); backdrop-filter: blur(10px);
  display: flex; height: 64px;
  border-top: 1px solid rgba(245,200,66,0.2);
}
nav.footer button {
  flex: 1; background: none; border: none; color: rgba(255,255,255,0.6);
  font-size: 11px; cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
}
nav.footer button span { font-size: 22px; }
nav.footer button.active { color: #f5c842; }

/* ========== Course Select ========== */
.cs-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, rgba(245,200,66,0.1), rgba(245,200,66,0.18));
  border: 1px solid rgba(245,200,66,0.3);
  border-radius: 12px; color: #fff;
  margin-bottom: 8px; cursor: pointer;
}
.cs-btn:active { transform: scale(0.97); }
.cs-btn .ico { font-size: 24px; }
.cs-btn .info { flex: 1; text-align: left; }
.cs-btn .info-name { font-size: 17px; font-weight: 800; }
.cs-btn .info-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.cs-btn .arrow { color: #f5c842; font-size: 18px; }

/* ====================================================
   🌟 G-LAND メイン（カード一体型）
   ==================================================== */

/* トップバー（ミニマル） */
.gl-topbar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; margin-bottom: 12px;
  background: linear-gradient(135deg, rgba(245,200,66,0.12), rgba(245,200,66,0.05));
  border: 1px solid rgba(245,200,66,0.3);
  border-radius: 12px;
}
.gl-topbar .cname {
  flex: 1; font-size: 14px; font-weight: 800; color: #f5c842;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gl-topbar .cvar {
  font-size: 10px; padding: 2px 6px; border-radius: 6px;
  background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.85);
  margin-left: 4px;
}
.gl-topbar-actions { display: flex; gap: 5px; }
.gl-mini-btn {
  padding: 8px 10px; font-size: 11px; font-weight: 800;
  border: none; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; gap: 3px;
}
.gl-mini-btn.detail { background: rgba(52,152,219,0.25); color: #5dade2; border: 1px solid rgba(52,152,219,0.5); }
.gl-mini-btn.qr { background: linear-gradient(135deg, #2ecc71, #16a085); color: #fff; box-shadow: 0 2px 6px rgba(46,204,113,0.4); }

/* 現在ホール・全体スコア表示バー */
.gl-statusbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px; margin-bottom: 14px;
  background: linear-gradient(135deg, rgba(245,200,66,0.18), rgba(245,200,66,0.05));
  border: 2px solid rgba(245,200,66,0.4);
  border-radius: 14px;
}
.gl-statusbar .sb-hole { display: flex; align-items: center; gap: 12px; }
.gl-statusbar .sb-hole-arrow {
  width: 44px; height: 44px;
  background: rgba(245,200,66,0.2); color: #f5c842;
  border: 2px solid rgba(245,200,66,0.5); border-radius: 50%;
  font-size: 18px; font-weight: 900; cursor: pointer;
}
.gl-statusbar .sb-hole-arrow:active { transform: scale(0.9); }
.gl-statusbar .sb-hole-info { text-align: center; min-width: 80px; }
.gl-statusbar .sb-hole-num { font-size: 28px; font-weight: 900; color: #f5c842; line-height: 1; }
.gl-statusbar .sb-hole-par { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 2px; }
.gl-statusbar .sb-total { text-align: right; }
.gl-statusbar .sb-total-label { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
.gl-statusbar .sb-total-val {
  font-size: 22px; font-weight: 900; color: #fff;
  margin-top: 2px; line-height: 1;
}
.gl-statusbar .sb-total-diff {
  font-size: 13px; font-weight: 800; margin-top: 3px;
}

/* 表示モード切替・編集ロック制御バー */
.gl-control-row {
  display: flex; gap: 8px; margin-bottom: 12px;
  align-items: stretch;
}
.gl-display-toggle {
  display: flex; flex: 1; gap: 4px;
  background: rgba(0,0,0,0.25); padding: 4px;
  border-radius: 10px;
}
.gl-display-toggle button {
  flex: 1; padding: 10px 6px;
  background: transparent; color: #ddd;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.gl-display-toggle button.on {
  background: #f5c842; color: #0a3d2e; font-weight: 900;
}

/* 🔒 編集モード切替ボタン */
.gl-edit-mode-btn {
  padding: 10px 14px;
  border-radius: 10px; border: 2px solid;
  font-size: 12px; font-weight: 900; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}
.gl-edit-mode-btn.locked {
  background: rgba(46,204,113,0.15);
  border-color: rgba(46,204,113,0.5);
  color: #2ecc71;
}
.gl-edit-mode-btn.unlocked {
  background: rgba(231,76,60,0.2);
  border-color: rgba(231,76,60,0.7);
  color: #e74c3c;
  animation: editPulse 1.5s ease-in-out infinite;
}
@keyframes editPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
  50% { box-shadow: 0 0 0 8px rgba(231,76,60,0); }
}

/* 🔒 編集ロック解除中の警告バナー */
.gl-unlock-warning {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; margin-bottom: 12px;
  background: linear-gradient(135deg, rgba(231,76,60,0.2), rgba(231,76,60,0.05));
  border: 2px dashed rgba(231,76,60,0.6);
  border-radius: 10px;
  font-size: 13px; color: #fff;
  animation: unlockGlow 1.5s ease-in-out infinite;
}
@keyframes unlockGlow {
  0%, 100% { background-color: rgba(231,76,60,0.15); }
  50% { background-color: rgba(231,76,60,0.25); }
}
.gl-unlock-warning .warn-ico { font-size: 22px; }
.gl-unlock-warning strong { color: #e74c3c; }

/* ====================================================
   🃏 スコアカード本体（カード一体型UI）
   ==================================================== */
.gl-scorecard {
  background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.25));
  border: 2px solid rgba(245,200,66,0.3);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  margin-bottom: 14px;
}
.gl-sc-title {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px;
  background: linear-gradient(135deg, rgba(245,200,66,0.25), rgba(245,200,66,0.1));
  border-bottom: 2px solid rgba(245,200,66,0.3);
}
.gl-sc-title h3 { color: #f5c842; font-size: 16px; font-weight: 900; }
.gl-sc-title .sync-dot {
  font-size: 10px; font-weight: 700;
  background: rgba(46,204,113,0.15); color: #2ecc71;
  padding: 3px 8px 3px 18px; border-radius: 8px;
  position: relative;
}
.gl-sc-title .sync-dot::before {
  content: ''; position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
  width: 6px; height: 6px; background: #2ecc71; border-radius: 50%;
  box-shadow: 0 0 6px #2ecc71;
  animation: syncFlash 1.6s ease-in-out infinite;
}
@keyframes syncFlash { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.gl-sc-hint {
  padding: 6px 14px;
  font-size: 11px; color: rgba(255,255,255,0.55);
  background: rgba(0,0,0,0.15);
  text-align: center;
}

/* スコアカード本体（左固定 + 横スクロール） */
.gl-sc-table { display: flex; }
.gl-sc-fixed {
  flex-shrink: 0;
  background: rgba(10,61,46,0.95);
  border-right: 2px solid rgba(245,200,66,0.3);
  z-index: 2;
}
.gl-sc-fixed .sc-header-cell {
  padding: 6px 12px; font-size: 11px; color: #f5c842;
  background: rgba(245,200,66,0.18);
  font-weight: 900; height: 76px;
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
  border-bottom: 2px solid rgba(255,255,255,0.1);
}
.gl-sc-fixed .sc-header-cell small { font-size: 9px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.gl-sc-fixed .sc-row-name {
  padding: 12px 12px; font-size: 17px; font-weight: 800;
  min-width: 130px; max-width: 170px;
  height: 64px;
  border-bottom: 2px solid rgba(255,255,255,0.12);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: #fff;
  background: rgba(0,0,0,0.15);
  display: flex; align-items: center; justify-content: space-between;
  gap: 6px;
}
.gl-sc-fixed .sc-row-name.is-me {
  background: linear-gradient(90deg, rgba(245,200,66,0.35), rgba(245,200,66,0.1));
  color: #f5c842;
  border-left: 4px solid #f5c842;
  padding-left: 8px;
}
.gl-sc-fixed .sc-row-name .pname-text {
  flex: 1;
  overflow: hidden; text-overflow: ellipsis;
}
.gl-sc-fixed .sc-row-name .pname-text .me-tag {
  font-size: 9px; background: #f5c842; color: #0a3d2e;
  padding: 2px 5px; border-radius: 4px; margin-left: 6px;
  font-weight: 900;
}

/* 🔒 プレイヤー別ロック表示 */
.gl-sc-fixed .sc-row-name .pname-lock {
  width: 28px; height: 28px;
  background: rgba(46,204,113,0.15);
  border: 1.5px solid rgba(46,204,113,0.5);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  cursor: pointer;
}
.gl-sc-fixed .sc-row-name .pname-lock.unlocked {
  background: rgba(231,76,60,0.2);
  border-color: rgba(231,76,60,0.7);
  animation: lockPulse 1.5s ease-in-out infinite;
}
@keyframes lockPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.5); }
  50% { box-shadow: 0 0 0 6px rgba(231,76,60,0); }
}

/* 横スクロール側 */
.gl-sc-scroll {
  flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  scroll-snap-type: x proximity;
}
.gl-sc-scroll::-webkit-scrollbar { height: 4px; }
.gl-sc-scroll::-webkit-scrollbar-thumb { background: rgba(245,200,66,0.4); border-radius: 2px; }
.gl-sc-row { display: flex; }

/* ヘッダーセル（ホール番号） */
.gl-sc-cell {
  flex-shrink: 0; width: 64px; height: 64px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 900;
  border-bottom: 2px solid rgba(255,255,255,0.1);
  border-right: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.03);
  scroll-snap-align: center;
  position: relative;
  cursor: pointer;
}
.gl-sc-cell.head {
  background: rgba(255,255,255,0.1); color: #f5c842;
  font-size: 16px; flex-direction: column; gap: 2px;
  height: 76px; padding: 6px 0;
  cursor: default;
}
.gl-sc-cell.head .hnum { font-size: 17px; font-weight: 900; }
.gl-sc-cell.head .hpar { font-size: 10px; opacity: 0.8; }
.gl-sc-cell.head.current {
  background: linear-gradient(180deg, #ffe680, #f5c842, #e6a02e) !important;
  color: #0a3d2e !important;
  box-shadow: 0 0 0 2px #fff inset;
  animation: holeFlash 1.5s ease-in-out infinite;
  z-index: 2;
}
@keyframes holeFlash {
  0%, 100% { box-shadow: 0 0 0 2px #fff inset, 0 0 12px rgba(245,200,66,0.7); }
  50% { box-shadow: 0 0 0 2px #fff inset, 0 0 20px rgba(245,200,66,1); }
}
.gl-sc-cell.head.current .hpar { color: rgba(10,61,46,0.85); font-weight: 800; }

/* 通常セル：タップ可能視覚化 */
.gl-sc-cell:not(.head) {
  border-left: 1px dashed rgba(255,255,255,0.08);
}
.gl-sc-cell:not(.head):hover {
  background: rgba(245,200,66,0.1);
}
.gl-sc-cell:not(.head):active {
  transform: scale(0.92);
}
.gl-sc-cell.filled {
  color: #fff;
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.2);
}
.gl-sc-cell.under { color: #e74c3c; background: rgba(231,76,60,0.18); font-size: 28px; }
.gl-sc-cell.birdie { color: #f39c12; background: rgba(243,156,18,0.15); }
.gl-sc-cell.par { color: #f5c842; }
.gl-sc-cell.bogey { color: #5dade2; background: rgba(93,173,226,0.1); }
.gl-sc-cell.double { color: #2980b9; background: rgba(41,128,185,0.15); }
.gl-sc-cell.over { color: #95a5a6; }
.gl-sc-cell.current:not(.head) {
  background: rgba(245,200,66,0.2) !important;
  border-left: 3px solid #f5c842;
  border-right: 3px solid #f5c842;
}
/* ロック中の他プレイヤーセル：薄く・タップ不可視覚 */
.gl-sc-cell.locked {
  opacity: 0.5;
  cursor: not-allowed;
}
.gl-sc-cell.locked::after {
  content: '🔒';
  position: absolute;
  top: 2px; right: 2px;
  font-size: 8px;
  opacity: 0.6;
}
.gl-sc-cell.editable-now {
  background: rgba(231,76,60,0.1);
  border: 1px solid rgba(231,76,60,0.4);
}

/* 合計・PAR差列 */

const Store = {
  get(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { return false; } },
  del(k) { localStorage.removeItem(k); },
  getProfile() { return this.get(STORE_KEYS.PROFILE, null); },
  saveProfile(p) { return this.set(STORE_KEYS.PROFILE, p); },
  getSettings() { return this.get(STORE_KEYS.SETTINGS, { inputMode: 'simple', displayMode: 'number', autoNext: true }); },
  saveSettings(s) { return this.set(STORE_KEYS.SETTINGS, s); },
  getDraft() { return this.get(STORE_KEYS.DRAFT, null); },
  saveDraft(d) { d.updatedAt = Date.now(); return this.set(STORE_KEYS.DRAFT, d); },
  clearDraft() { this.del(STORE_KEYS.DRAFT); },
  getHistory() { return this.get(STORE_KEYS.HISTORY, []); },
  appendRound(r) {
    const h = this.getHistory();
    r.id = r.id || `r_${Date.now()}`;
    r.savedAt = Date.now();
    h.unshift(r);
    if (h.length > 50) h.length = 50;
    return this.set(STORE_KEYS.HISTORY, h);
  },
  clearHistory() { this.del(STORE_KEYS.HISTORY); },
  getGroup() { return this.get(STORE_KEYS.GROUP, null); },
  saveGroup(g) { return this.set(STORE_KEYS.GROUP, g); },
  clearGroup() { this.del(STORE_KEYS.GROUP); },
};

// ============================================================
// 2. State
//   独立管理ロジック：
//   scores = ストローク総数（合計打数）
//   putts  = パット数（内訳）
//   shots  = 純粋ショット数（カウンターモード）
// ============================================================
const State = {
  players: [],
  activeId: null,
  hole: 0,
  course: null,
  group: null,
  settings: { inputMode: 'simple', displayMode: 'number', autoNext: true },
  // 編集ロック状態：{ playerId: false } で初期化、true = 編集可能（unlock状態）
  editUnlocked: {}, 

  reset() {
    this.players = []; this.activeId = null; this.hole = 0;
    this.course = null; this.group = null;
    this.editUnlocked = {};
  },
  getSelf() { return this.players.find(p => p.isSelf); },
  getActive() { return this.players.find(p => p.id === this.activeId) || this.players[0]; },
  setHole(idx) {
    if (!this.course || idx < 0 || idx >= this.course.holes) return;
    this.hole = idx;
    emit('hole:changed', idx);
  },
  setCourse(c) {
    this.course = c;
    this.players.forEach(p => {
      if (!p.scores || p.scores.length !== c.holes) {
        p.scores = new Array(c.holes).fill(null);
        p.putts = new Array(c.holes).fill(null);
        p.shots = new Array(c.holes).fill(null);
      }
    });
    emit('course:changed', c);
  },
  setActivePlayer(id) {
    if (!this.players.find(p => p.id === id)) return;
    this.activeId = id;
    emit('player:changed', id);
  },
  addPlayer(p) {
    if (this.players.length >= APP.MAX_PLAYERS) return null;
    const id = p.id || `p_${Date.now()}_${Math.random().toString(36).slice(2,6)}`;
    const holes = this.course ? this.course.holes : 18;
    const np = {
      id,
      name: p.name || 'ゲスト',
      scores: p.scores || new Array(holes).fill(null),
      putts:  p.putts  || new Array(holes).fill(null),
      shots:  p.shots  || new Array(holes).fill(null),
      isPublic: p.isPublic !== false,
      isSelf: !!p.isSelf,
      isHost: !!p.isHost,
    };
    this.players.push(np);
    if (!this.activeId) this.activeId = id;
    emit('player:added', np);
    return np;
  },
  removePlayer(id) {
    const i = this.players.findIndex(p => p.id === id);
    if (i < 0) return false;
    if (this.players[i].isSelf) return false;
    this.players.splice(i, 1);
    if (this.activeId === id) this.activeId = this.players[0]?.id || null;
    delete this.editUnlocked[id];
    emit('player:removed', id);
    return true;
  },
  renamePlayer(id, name) {
    const p = this.players.find(p => p.id === id);
    if (!p) return false;
    p.name = name;
    emit('player:renamed', { id, name });
    return true;
  },
  setScore(playerId, holeIdx, stroke) {
    const p = this.players.find(p => p.id === playerId);
    if (!p) return;
    p.scores[holeIdx] = stroke;
    emit('score:updated', { playerId, holeIdx, stroke });
  },
  setPutt(playerId, holeIdx, putt) {
    const p = this.players.find(p => p.id === playerId);
    if (!p) return;
    p.putts[holeIdx] = putt;
    emit('putt:updated', { playerId, holeIdx, putt });
  },
  setShots(playerId, holeIdx, shots) {
    const p = this.players.find(p => p.id === playerId);
    if (!p) return;
    p.shots[holeIdx] = shots;
    const putt = p.putts[holeIdx] || 0;
    p.scores[holeIdx] = shots + putt;
    emit('score:updated', { playerId, holeIdx, stroke: p.scores[holeIdx] });
  },
  incrementPutt(playerId, holeIdx) {
    const p = this.players.find(p => p.id === playerId);
    if (!p) return;
    const curP = p.putts[holeIdx] || 0;
    const curS = p.shots[holeIdx] || 0;
    p.putts[holeIdx] = curP + 1;
    p.scores[holeIdx] = curS + p.putts[holeIdx];
    emit('putt:updated', { playerId, holeIdx, putt: p.putts[holeIdx] });
    emit('score:updated', { playerId, holeIdx, stroke: p.scores[holeIdx] });
  },
  updateSetting(key, val) {
    this.settings[key] = val;
    Store.saveSettings(this.settings);
    emit('settings:changed', { key, val });
  },
  setGroup(g) { this.group = g; emit('group:changed', g); },

  // === 🔒 編集ロック管理 ===
  isEditable(playerId) {
    const p = this.players.find(p => p.id === playerId);
    if (!p) return false;
    if (p.isSelf) return true; // 自分は常に編集可能
    return !!this.editUnlocked[playerId];
  },
  unlock(playerId) {
    this.editUnlocked[playerId] = true;
    emit('edit:unlocked', playerId);
  },
  lock(playerId) {
    this.editUnlocked[playerId] = false;
    emit('edit:locked', playerId);
  },
  lockAll() {
    this.editUnlocked = {};
    emit('edit:all-locked');
  },
  hasAnyUnlocked() {
    return Object.values(this.editUnlocked).some(v => v);
  },

  snapshot() { return JSON.parse(JSON.stringify({
    players: this.players, activeId: this.activeId, hole: this.hole,
    course: this.course, group: this.group, settings: this.settings,
  })); },
  restore(s) {
    if (!s) return;
    Object.assign(this, s);
    emit('state:restored', s);
  },
};

// 3. EventBus
// ============================================================
const _listeners = new Map();
function on(event, h) {
  if (!_listeners.has(event)) _listeners.set(event, new Set());
  _listeners.get(event).add(h);
}
function emit(event, data) {
  const s = _listeners.get(event);
  if (!s) return;
  for (const h of s) { try { h(data); } catch (e) { console.error('[Bus]', event, e); } }
}

function toast(msg, type = 'info', duration = 2200) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, duration);
}

function esc(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}

// 記号変換: -3:★ -2:◎ -1:○ 0:━ +1:△ +2:□ +3以上:数字
function diffToSymbol(diff) {
  if (diff <= -3) return '★';
  if (diff === -2) return '◎';
  if (diff === -1) return '○';
  if (diff === 0) return '━';
  if (diff === 1) return '△';
  if (diff === 2) return '□';
  return `+${diff}`;
}

function formatScore(stroke, par, mode) {
  if (stroke == null) return '-';
  if (mode === 'symbol') {
    const d = stroke - par;
    return diffToSymbol(d);
  }
  return String(stroke);
}

function diffClass(diff) {
  if (diff <= -2) return 'under';
  if (diff === -1) return 'birdie';
  if (diff === 0) return 'par';
  if (diff === 1) return 'bogey';
  if (diff === 2) return 'double';
  return 'over';
}

function diffName(diff) {
  if (diff == null) return '';
  if (diff <= -3) return 'ALBATROSS';
  if (diff === -2) return 'EAGLE';
  if (diff === -1) return 'BIRDIE';
  if (diff === 0) return 'PAR';
  if (diff === 1) return 'BOGEY';
  if (diff === 2) return 'DOUBLE';
  return diff > 0 ? `+${diff}` : '';
}

function getDiffColor(diff) {
  if (diff == null) return '#f5c842';
  if (diff <= -2) return '#e74c3c';
  if (diff === -1) return '#f39c12';
  if (diff === 0) return '#f5c842';
  if (diff === 1) return '#5dade2';
  if (diff === 2) return '#2980b9';
  return '#95a5a6';
}

// ============================================================
// 7. QRコード生成（自前実装 Version5 Level L）
// ============================================================
const QR_EXP = new Array(256), QR_LOG = new Array(256);
(function() {
  for (let i = 0; i < 8; i++) QR_EXP[i] = 1 << i;
  for (let i = 8; i < 256; i++) QR_EXP[i] = QR_EXP[i-4] ^ QR_EXP[i-5] ^ QR_EXP[i-6] ^ QR_EXP[i-8];
  for (let i = 0; i < 255; i++) QR_LOG[QR_EXP[i]] = i;
})();
function gfMul(a,b) { return (a===0||b===0)?0:QR_EXP[(QR_LOG[a]+QR_LOG[b])%255]; }
function rsGen(n) {
  let p = [1];
  for (let i = 0; i < n; i++) {
    const np = new Array(p.length+1).fill(0);
    for (let j = 0; j < p.length; j++) { np[j] ^= p[j]; np[j+1] ^= gfMul(p[j], QR_EXP[i]); }
    p = np;
  }
  return p;
}
function rsEnc(data, ec) {
  const gen = rsGen(ec);
  const r = data.concat(new Array(ec).fill(0));
  for (let i = 0; i < data.length; i++) {
    const f = r[i];
    if (f !== 0) for (let j = 0; j < gen.length; j++) r[i+j] ^= gfMul(gen[j], f);
  }
  return r.slice(data.length);
}
function genQR(text, scale = 8, margin = 2) {
  const SIZE = 37, DATA_BYTES = 108, EC_BYTES = 26;
  const utf8 = [];
  for (let i = 0; i < text.length; i++) {
    let c = text.charCodeAt(i);
    if (c < 0x80) utf8.push(c);
    else if (c < 0x800) { utf8.push(0xC0|(c>>6)); utf8.push(0x80|(c&0x3F)); }
    else { utf8.push(0xE0|(c>>12)); utf8.push(0x80|((c>>6)&0x3F)); utf8.push(0x80|(c&0x3F)); }
  }
  if (utf8.length > DATA_BYTES - 3) return '<div style="color:#e74c3c;padding:20px;">QRデータが大きすぎます</div>';
  let bits = [];
  const addBits = (n, len) => { for (let i = len-1; i >= 0; i--) bits.push((n>>i)&1); };
  addBits(0b0100, 4);
  addBits(utf8.length, 8);
  for (const b of utf8) addBits(b, 8);
  addBits(0, 4);
  while (bits.length % 8 !== 0) bits.push(0);
  const bytes = [];
  for (let i = 0; i < bits.length; i+=8) {
    let v = 0;
    for (let j = 0; j < 8; j++) if (bits[i+j]) v |= (1<<(7-j));
    bytes.push(v);
  }
  const pads = [0xEC, 0x11];
  while (bytes.length < DATA_BYTES) bytes.push(pads[bytes.length%2]);
  const ec = rsEnc(bytes, EC_BYTES);
  const all = bytes.concat(ec);
  const allBits = [];
  for (const b of all) for (let i = 7; i >= 0; i--) allBits.push((b>>i)&1);

  const m = [];
  for (let i = 0; i < SIZE; i++) m.push(new Array(SIZE).fill(null));

  function placeFinder(r, c) {
    for (let dr = -1; dr <= 7; dr++) for (let dc = -1; dc <= 7; dc++) {
      const rr = r+dr, cc = c+dc;
      if (rr<0||rr>=SIZE||cc<0||cc>=SIZE) continue;
      if ((dr>=0&&dr<=6&&(dc===0||dc===6))||(dc>=0&&dc<=6&&(dr===0||dr===6))||(dr>=2&&dr<=4&&dc>=2&&dc<=4)) m[rr][cc] = 1;
      else m[rr][cc] = 0;
    }
  }
  placeFinder(0,0); placeFinder(0,SIZE-7); placeFinder(SIZE-7,0);
  for (let i = 0; i < 8; i++) {
    if (m[7][i]===null) m[7][i]=0; if (m[i][7]===null) m[i][7]=0;
    if (m[7][SIZE-1-i]===null) m[7][SIZE-1-i]=0; if (m[i][SIZE-8]===null) m[i][SIZE-8]=0;
    if (m[SIZE-8][i]===null) m[SIZE-8][i]=0; if (m[SIZE-1-i][7]===null) m[SIZE-1-i][7]=0;
  }
  for (const r of [6,30]) for (const c of [6,30]) {
    if ((r===6&&c===6)||(r===6&&c===30)||(r===30&&c===6)) continue;
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) {
      if (Math.abs(dr)===2||Math.abs(dc)===2||(dr===0&&dc===0)) m[r+dr][c+dc] = 1;
      else m[r+dr][c+dc] = 0;
    }
  }
  for (let i = 8; i < SIZE-8; i++) {
    if (m[6][i]===null) m[6][i] = i%2===0?1:0;
    if (m[i][6]===null) m[i][6] = i%2===0?1:0;
  }
  const fbits = [1,1,1,0,1,1,1,1,1,0,0,0,1,0,0];
  for (let i = 0; i < 6; i++) m[i][8] = fbits[i];
  m[7][8]=fbits[6]; m[8][8]=fbits[7]; m[8][7]=fbits[8];
  for (let i = 0; i < 6; i++) m[8][5-i] = fbits[9+i];
  for (let i = 0; i < 7; i++) m[SIZE-1-i][8] = fbits[i];
  for (let i = 0; i < 8; i++) m[8][SIZE-8+i] = fbits[7+i];
  m[SIZE-8][8] = 1;

  let idx = 0, dir = -1, col = SIZE-1;
  while (col > 0) {
    if (col === 6) col--;
    let row = (dir === -1) ? SIZE-1 : 0;
    while (row >= 0 && row < SIZE) {
      for (let c = 0; c < 2; c++) {
        const cc = col - c;
        if (m[row][cc] === null) {
          const bit = idx < allBits.length ? allBits[idx++] : 0;
          m[row][cc] = ((row+cc)%2 === 0) ? (1-bit) : bit;
        }
      }
      row += dir;
    }
    dir = -dir;
    col -= 2;
  }

  const fullSize = (SIZE + 2*margin) * scale;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${fullSize}" height="${fullSize}" viewBox="0 0 ${SIZE+2*margin} ${SIZE+2*margin}" shape-rendering="crispEdges">`;
  svg += '<rect width="100%" height="100%" fill="#fff"/>';
  for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) {
    if (m[r][c] === 1) svg += `<rect x="${c+margin}" y="${r+margin}" width="1" height="1" fill="#0a3d2e"/>`;
  }
  svg += '</svg>';
  return svg;
}

// 8. ライブ同期（BroadcastChannel）
// ============================================================
const Sync = {
  bc: null, groupId: null, pullTimer: null,
  init() {
    if ('BroadcastChannel' in window) {
      this.bc = new BroadcastChannel('gworld-sync');
      this.bc.addEventListener('message', (e) => this.onMessage(e.data));
    }
  },
  start(groupId) {
    this.groupId = groupId;
    State.setGroup({ id: groupId, joinedAt: Date.now() });
    Store.saveGroup({ id: groupId });
    if (this.bc) this.bc.postMessage({ type: 'hello', from: State.getSelf()?.id, groupId });
    if (this.pullTimer) clearInterval(this.pullTimer);
    this.pullTimer = setInterval(() => this.broadcast(), 5000);
  },
  stop() {
    this.groupId = null;
    if (this.pullTimer) clearInterval(this.pullTimer);
    Store.clearGroup();
    State.setGroup(null);
  },
  broadcast() {
    if (!this.groupId || !this.bc) return;
    const self = State.getSelf();
    if (!self) return;
    this.bc.postMessage({
      type: 'players-update',
      groupId: this.groupId,
      players: State.players.filter(p => p.isPublic !== false).map(p => ({
        id: p.id, name: p.name, scores: p.scores, putts: p.putts, shots: p.shots,
        isPublic: p.isPublic, isHost: p.isHost,
      })),
    });
  },
  onMessage(data) {
    if (!data || data.groupId !== this.groupId) return;
    if (data.type === 'players-update' && Array.isArray(data.players)) {
      this.mergePlayers(data.players);
    } else if (data.type === 'hello') {
      this.broadcast();
    }
  },
  mergePlayers(remote) {
    const self = State.getSelf();
    let changed = false;
    remote.forEach(rp => {
      if (self && rp.id === self.id) return;
      const ex = State.players.find(p => p.id === rp.id);
      if (ex) {
        if (JSON.stringify(ex.scores) !== JSON.stringify(rp.scores)) { ex.scores = rp.scores; changed = true; }
        if (JSON.stringify(ex.putts) !== JSON.stringify(rp.putts)) { ex.putts = rp.putts; changed = true; }
        if (JSON.stringify(ex.shots) !== JSON.stringify(rp.shots)) { ex.shots = rp.shots; changed = true; }
        if (ex.name !== rp.name) { ex.name = rp.name; changed = true; }
      } else {
        State.addPlayer({ id: rp.id, name: rp.name, scores: rp.scores, putts: rp.putts, shots: rp.shots, isPublic: rp.isPublic, isHost: rp.isHost, isSelf: false });
        changed = true;
      }
    });
    if (changed) emit('sync:merged');
  },
};
on('score:updated', () => Sync.broadcast());
on('putt:updated', () => Sync.broadcast());
on('player:added', () => Sync.broadcast());
on('player:renamed', () => Sync.broadcast());

registerScreen('gland', () => {
  const root = document.getElementById('screen-gland');
  const pendingJoin = sessionStorage.getItem('gw.pendingJoin');
  if (pendingJoin) { handleQRJoin(root, pendingJoin); return; }

  const profile = Store.getProfile();
  if (!profile) { renderRegister(root); return; }

function ensureSelf(profile) {
  if (State.getSelf()) return;
  State.addPlayer({ name: profile.name, isSelf: true, isPublic: profile.isPublic !== false });

function bindScorecardEvents(root) {
  // アクションボタン
  root.querySelectorAll('[data-act]').forEach(el => el.onclick = () => handleAction(el.dataset.act, el));
  // ヘッダーセルタップ → ホール変更
  root.querySelectorAll('.gl-sc-cell.head[data-hidx]').forEach(el => el.onclick = () => {
    State.setHole(parseInt(el.dataset.hidx, 10));
  });
  // 通常セルタップ → スコア入力モーダル
  root.querySelectorAll('.gl-sc-cell:not(.head)[data-pid][data-hidx]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const pid = el.dataset.pid;
      const hidx = parseInt(el.dataset.hidx, 10);
      // 🔒 編集権限チェック
      if (!State.isEditable(pid)) {
        const player = State.players.find(p => p.id === pid);
        if (!player) return;
        if (confirm(`${player.name}さんのスコアを代理入力しますか？\n（誤タップ防止のため、編集を有効化します）`)) {
          State.unlock(pid);
          toast(`🔓 ${player.name}さんの編集を有効化しました`, 'info');
          setTimeout(() => openScoreModal(pid, hidx), 200);
        }
        return;
      }
      openScoreModal(pid, hidx);
    };
  });
  // 個別ロックトグル
  root.querySelectorAll('[data-lock-pid]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const pid = el.dataset.lockPid;
      const player = State.players.find(p => p.id === pid);
      if (!player) return;
      if (State.isEditable(pid)) {
        State.lock(pid);
        toast(`🔒 ${player.name}さんをロックしました`, 'info', 1500);
      } else {
        if (confirm(`${player.name}さんの編集を有効化しますか？\n（代理入力モード）`)) {
          State.unlock(pid);
          toast(`🔓 ${player.name}さんの編集を有効化`, 'info', 1500);
        }
      }
    };
  });
  // プレイヤー名タップ（自分以外）→ 編集モーダル
  root.querySelectorAll('.sc-row-name[data-pid]').forEach(el => {
    el.addEventListener('dblclick', () => {
      const p = State.players.find(x => x.id === el.dataset.pid);
      if (!p || p.isSelf) return;
      openCompanionModal(p.id);
    });
  });
}

function handleAction(action, el) {
  const me = State.getSelf();
  const h = State.hole;
  const c = State.course;
  if (!me || !c) return;

  switch (action) {
    case 'prev-hole': State.setHole(Math.max(0, h - 1)); break;
    case 'next-hole': State.setHole(Math.min(c.holes - 1, h + 1)); break;
    case 'disp-number': State.updateSetting('displayMode', 'number'); break;
    case 'disp-symbol': State.updateSetting('displayMode', 'symbol'); break;
    case 'lock-all': {
      if (State.hasAnyUnlocked()) {
        State.lockAll();
        toast('🔒 すべての編集をロックしました', 'info', 1500);
      } else {
        toast('💡 個別のセルや 🔒 ボタンをタップして編集権限を有効化', 'info', 2500);
      }
      break;
    }
    case 'course-detail': openCourseDetail(); break;
    case 'invite-qr': openInviteQR(); break;
    case 'add-companion': openCompanionModal(null); break;
    case 'finish': {
      if (!confirm('ラウンドを終了して履歴に保存しますか？')) return;
      const snap = State.snapshot();
      Store.appendRound({ course: snap.course, players: snap.players, group: snap.group });
      Store.clearDraft();
      State.reset();
      Sync.stop();
      toast('履歴に保存しました 🎉', 'success');
      setTimeout(() => go('home'), 600);
      break;
    }
  }
}

// 現在ホール中央追従
function centerCurrentHole() {
  const scroll = document.getElementById('sc-scroll');
  if (!scroll) return;
  const doScroll = () => {
    if (scroll.clientWidth === 0) return;
    const target = scroll.querySelector('.gl-sc-cell.head.current');
    if (!target) return;
    const cw = scroll.clientWidth;
    const tl = target.offsetLeft;
    const tw = target.offsetWidth;
    scroll.scrollTo({ left: Math.max(0, tl - cw/2 + tw/2), behavior: 'smooth' });
  };
  requestAnimationFrame(doScroll);
  setTimeout(doScroll, 150);
  setTimeout(doScroll, 400);
  setTimeout(doScroll, 800);
}

let _editingCtx = null; // { playerId, holeIdx, tempScore, tempPutt, tempShots }

function openScoreModal(playerId, holeIdx) {
  const player = State.players.find(p => p.id === playerId);
  const course = State.course;
  if (!player || !course) return;

  const par = course.pars[holeIdx];
  // 既存値か、未入力ならPARから開始
  let curScore = player.scores[holeIdx] != null ? player.scores[holeIdx] : par;
  let curPutt = player.putts[holeIdx] || 0;
  let curShots = player.shots[holeIdx] != null ? player.shots[holeIdx] : Math.max(0, curScore - curPutt);

  _editingCtx = { playerId, holeIdx, tempScore: curScore, tempPutt: curPutt, tempShots: curShots, mode: State.settings.inputMode };

  const modal = document.getElementById('score-modal');
  modal.classList.add('open');
  renderScoreModalBody();
}

function renderScoreModalBody() {
  if (!_editingCtx) return;
  const { playerId, holeIdx, mode } = _editingCtx;
  const player = State.players.find(p => p.id === playerId);
  const course = State.course;
  if (!player || !course) return;

  const par = course.pars[holeIdx];
  const holeLabel = course.labels[holeIdx];
  const isProxy = !player.isSelf;

  const body = document.getElementById('score-modal-body');

  let inputHtml = '';
  if (mode === 'simple') {
    const stroke = _editingCtx.tempScore;
    const putt = _editingCtx.tempPutt;
    const diff = stroke - par;
    const diffStr = diff === 0 ? '(PAR)' : (diff > 0 ? `(+${diff})` : `(${diff})`);
    const diffColor = getDiffColor(diff);
    const nameStr = diffName(diff);

    inputHtml = `
      <!-- ストローク表示 -->
      <div class="sim-stroke" style="border-color:${diffColor};">
        <div class="lbl">ストローク（合計打数）</div>
        <div class="big" style="color:${diffColor};">${stroke}</div>
        <div class="diff" style="color:${diffColor};">${diffStr}</div>
        ${nameStr ? `<div class="name" style="color:${diffColor};">${nameStr}</div>` : ''}
      </div>

      <!-- 56px+ 円形ボタン -->
      <div class="sim-stroke-controls">
        <button class="sim-circle-btn minus" data-sim-act="stroke-minus">−</button>
        <div class="sim-stroke-center">タップで±1</div>
        <button class="sim-circle-btn plus" data-sim-act="stroke-plus">＋</button>
      </div>

      <!-- パット内訳（独立） -->
      <div class="sim-putt">
        <div class="plbl">内訳：パット数（独立カウント）</div>
        <div class="pval">${putt}</div>
        <div class="pmark">※ ストロークには加算しません</div>
        <div class="sim-putt-controls">
          <button class="sim-putt-btn" data-sim-act="putt-minus">−</button>
          <button class="sim-putt-btn" data-sim-act="putt-plus">＋</button>
        </div>
      </div>
    `;
  } else {
    // カウンターモード
    const shots = _editingCtx.tempShots;
    const putt = _editingCtx.tempPutt;
    const total = shots + putt;
    const diff = total > 0 ? total - par : null;
    const diffStr = diff == null ? '' : (diff === 0 ? '(PAR)' : (diff > 0 ? `(+${diff})` : `(${diff})`));
    const diffColor = getDiffColor(diff);
    const nameStr = diffName(diff);

    inputHtml = `
      <div class="sim-stroke" style="border-color:${diffColor};">
        <div class="lbl">合計打数（ショット＋パット）</div>
        <div class="big" style="color:${diffColor};">${total > 0 ? total : '-'}</div>
        <div class="diff" style="color:${diffColor};">${diffStr}</div>
        ${nameStr ? `<div class="name" style="color:${diffColor};">${nameStr}</div>` : ''}
      </div>

      <div class="sim-counter">
        <div class="sim-counter-cell shot">
          <div class="cnt-lbl">ショット</div>
          <div class="cnt-val">${shots}</div>
          <div class="cnt-controls">
            <button class="cnt-btn minus" data-sim-act="shot-minus">−</button>
            <button class="cnt-btn" data-sim-act="shot-plus">＋</button>
          </div>
        </div>
        <div class="sim-counter-cell putt">
          <div class="cnt-lbl">パット</div>
          <div class="cnt-val">${putt}</div>
          <div class="cnt-controls">
            <button class="cnt-btn minus" data-sim-act="putt-minus-c">−</button>
            <button class="cnt-btn" data-sim-act="putt-plus-c">＋</button>
          </div>
        </div>
      </div>
    `;
  }

  body.innerHTML = `
    <!-- ヘッダー -->
    <div class="sim-header">
      <div class="sim-player">
        ${esc(player.name)}${player.isSelf ? '<span class="sim-self-tag">自分</span>' : ''}
      </div>
      <div class="sim-hole">
        <strong>${holeLabel}H</strong> ／ PAR ${par}
      </div>
    </div>

    ${isProxy ? `
      <div class="sim-proxy-warn">
        <span class="warn-ico">⚠️</span>
        <span><strong>代理入力</strong>：${esc(player.name)}さんのスコアを編集中です</span>
      </div>
    ` : ''}

    <!-- モード切替タブ -->
    <div class="sim-mode-tabs">
      <button class="${mode==='simple'?'on':''}" data-sim-act="mode-simple">シンプル（結果入力）</button>
      <button class="${mode==='counter'?'on':''}" data-sim-act="mode-counter">カウンター（逐次）</button>
    </div>

    ${inputHtml}

    <!-- アクション -->
    <div class="sim-actions">
      <button class="sim-action-cancel" data-sim-act="cancel">キャンセル</button>
      <button class="sim-action-clear" data-sim-act="clear">クリア</button>
      <button class="sim-action-ok" data-sim-act="ok">確定して保存</button>
    </div>

    <div class="sim-auto-next">
      <input type="checkbox" id="sim-auto-next" ${State.settings.autoNext ? 'checked' : ''}>
      <label for="sim-auto-next">確定後、自分のスコアなら次ホールへ自動移動</label>
    </div>
  `;

  // イベント結線
  body.querySelectorAll('[data-sim-act]').forEach(el => {
    el.onclick = () => handleSimAction(el.dataset.simAct);
  });
  const autoNextCheck = document.getElementById('sim-auto-next');
  if (autoNextCheck) {
    autoNextCheck.onchange = () => State.updateSetting('autoNext', autoNextCheck.checked);
  }
}

function handleSimAction(action) {
  if (!_editingCtx) return;
  const ctx = _editingCtx;
  const par = State.course.pars[ctx.holeIdx];

  switch (action) {
    case 'mode-simple':
      _editingCtx.mode = 'simple';
      State.updateSetting('inputMode', 'simple');
      renderScoreModalBody();
      break;
    case 'mode-counter':
      _editingCtx.mode = 'counter';
      State.updateSetting('inputMode', 'counter');
      renderScoreModalBody();
      break;
    // === シンプルモード ===
    case 'stroke-minus':
      ctx.tempScore = Math.max(1, ctx.tempScore - 1);
      renderScoreModalBody();
      break;
    case 'stroke-plus':
      ctx.tempScore = Math.min(20, ctx.tempScore + 1);
      renderScoreModalBody();
      break;
    case 'putt-minus':
      ctx.tempPutt = Math.max(0, ctx.tempPutt - 1);
      renderScoreModalBody();
      break;
    case 'putt-plus':
      ctx.tempPutt = Math.min(15, ctx.tempPutt + 1);
      renderScoreModalBody();
      break;
    // === カウンターモード ===
    case 'shot-minus':
      ctx.tempShots = Math.max(0, ctx.tempShots - 1);
      renderScoreModalBody();
      break;
    case 'shot-plus':
      ctx.tempShots = ctx.tempShots + 1;
      renderScoreModalBody();
      break;
    case 'putt-minus-c':
      ctx.tempPutt = Math.max(0, ctx.tempPutt - 1);
      renderScoreModalBody();
      break;
    case 'putt-plus-c':
      ctx.tempPutt = ctx.tempPutt + 1;
      renderScoreModalBody();
      break;
    // === 確定・クリア ===
    case 'ok': {
      const { playerId, holeIdx, mode, tempScore, tempPutt, tempShots } = ctx;
      const player = State.players.find(p => p.id === playerId);
      if (!player) return;
      if (mode === 'simple') {
        // シンプル：ストロークとパットを独立保存
        State.setScore(playerId, holeIdx, tempScore);
        State.setPutt(playerId, holeIdx, tempPutt);
        // shots を再計算（合計-パット）
        player.shots[holeIdx] = Math.max(0, tempScore - tempPutt);
      } else {
        // カウンター：ショット+パット=合計
        State.setShots(playerId, holeIdx, tempShots);
        State.setPutt(playerId, holeIdx, tempPutt);
        player.scores[holeIdx] = tempShots + tempPutt;
        emit('score:updated', { playerId, holeIdx, stroke: player.scores[holeIdx] });
      }
      document.getElementById('score-modal').classList.remove('open');
      toast('保存しました 🎉', 'success', 1500);

      // 自分のスコア + autoNextがONなら次ホールへ
      if (State.settings.autoNext && player.isSelf && holeIdx === State.hole && holeIdx < State.course.holes - 1) {
        setTimeout(() => State.setHole(holeIdx + 1), 300);
      }
      // 代理入力後は自動ロック（誤タップ防止）
      if (!player.isSelf) {
        setTimeout(() => {
          State.lock(playerId);
          toast(`🔒 ${player.name}さんを自動ロック`, 'info', 1500);
        }, 800);
      }
      _editingCtx = null;
      break;
    }
    case 'clear': {
      const { playerId, holeIdx } = ctx;
      State.setScore(playerId, holeIdx, null);
      State.setPutt(playerId, holeIdx, null);
      const player = State.players.find(p => p.id === playerId);
      if (player) player.shots[holeIdx] = null;
      document.getElementById('score-modal').classList.remove('open');
      toast('クリアしました', 'info', 1200);
      _editingCtx = null;
      break;
    }
    case 'cancel':
      document.getElementById('score-modal').classList.remove('open');
      _editingCtx = null;
      break;
  }
}

function openInviteQR() {
  const modal = document.getElementById('qr-modal');
  const body = document.getElementById('qr-body');
  let group = State.group;

  if (!group) {
    const self = State.getSelf();
    if (!self) { toast('先にプロフィール登録してください', 'error'); return; }
    self.isHost = true;
    const groupId = `g_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
    const c = State.course;
    const groupName = c ? `${c.name} ${c.variant}` : 'プライベートルーム';
    group = { id: groupId, name: groupName, hostId: self.id, createdAt: Date.now() };
    Sync.start(groupId);
    State.setGroup(group);
    Store.saveGroup(group);
  }

  const base = location.origin + location.pathname.replace(/\/$/, '');
  const joinURL = `${base}/#join=${group.id}`;
  let qrSvg;
  try { qrSvg = genQR(joinURL, 7, 2); }
  catch (e) { qrSvg = '<div style="color:#e74c3c;">QR生成失敗</div>'; }

  body.innerHTML = `
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:16px;font-weight:800;color:#f5c842;">${esc(group.name)}</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px;">ID: ${esc(group.id)}</div>
    </div>
    <div class="qr-img">${qrSvg}</div>
    <p class="qr-hint">📷 同伴者にこのQRを読み取ってもらうと<br>自動で同じ組に参加できます</p>
    <div class="qr-url">
      <input readonly value="${esc(joinURL)}" id="qr-url-input">
      <button id="qr-copy">コピー</button>
    </div>
    <button class="btn-primary btn-green" id="qr-share" style="margin-top:12px;">📤 リンクを共有</button>
  `;
  document.getElementById('qr-copy').onclick = async () => {
    try { await navigator.clipboard.writeText(joinURL); toast('URLをコピー', 'success'); }
    catch (e) {
      const inp = document.getElementById('qr-url-input');
      inp.select(); document.execCommand('copy');
      toast('URLをコピー', 'success');
    }
  };
  document.getElementById('qr-share').onclick = async () => {
    if (navigator.share) {
      try { await navigator.share({ title: 'G-WORLD 招待', url: joinURL }); } catch (e) {}
    } else {
      try { await navigator.clipboard.writeText(joinURL); toast('URLをコピー', 'success'); } catch (e) {}
    }
  };
  modal.classList.add('open');
}

function openCompanionModal(playerId) {
  const modal = document.getElementById('companion-modal');
  const isEdit = !!playerId;
  const player = isEdit ? State.players.find(p => p.id === playerId) : null;

  document.getElementById('comp-title').textContent = isEdit ? '同伴者を編集' : '同伴者を追加';
  document.getElementById('comp-name').value = player?.name || '';
  document.getElementById('comp-public').checked = player?.isPublic !== false;
  const delBtn = document.getElementById('comp-delete');
  delBtn.style.display = (isEdit && !player?.isSelf) ? 'block' : 'none';
  delBtn.onclick = () => {
    if (!player) return;
    if (confirm(`${player.name}さんを削除しますか？`)) {
      State.removePlayer(playerId);
      toast('削除しました', 'info');
      modal.classList.remove('open');
    }
  };
  document.getElementById('comp-ok').onclick = () => {
    const n = document.getElementById('comp-name').value.trim();
    const p = document.getElementById('comp-public').checked;
    if (!n) { toast('名前を入力', 'error'); return; }
    if (isEdit) {
      State.renamePlayer(playerId, n);
      const pl = State.players.find(x => x.id === playerId);
      if (pl) pl.isPublic = p;
      toast('更新しました', 'success');
    } else {
      const a = State.addPlayer({ name: n, isPublic: p });
      if (a) toast(`${n}さんを追加`, 'success');
      else { toast('これ以上追加できません（最大16名）', 'error'); return; }
    }
    modal.classList.remove('open');
  };
  modal.classList.add('open');
  setTimeout(() => document.getElementById('comp-name').focus(), 200);
}

    Sync.stop(); State.setGroup(null);
    toast('退出しました', 'info'); activate('gcompete');
  };
  document.getElementById('gc-show-qr').onclick = openInviteQR;
});

function computeLeaderboard() {
  const c = State.course;
  if (!c) return [];
  const rows = State.players.filter(p => p.isPublic !== false).map(p => {
    let t = 0, ps = 0, pl = 0;
    for (let i = 0; i < c.holes; i++) {
      if (p.scores[i] != null) { t += p.scores[i]; ps += c.pars[i]; pl++; }
    }
    const d = t - ps;
    return { id: p.id, name: p.name, isSelf: p.isSelf, played: pl, total: t, diff: d,
      diffStr: d === 0 ? 'E' : (d > 0 ? `+${d}` : String(d)) };
  });
  rows.sort((a,b) => b.played - a.played || a.diff - b.diff);
  rows.forEach((r, i) => {
    r.rank = i + 1;
    r.medal = i === 0 ? '🥇' : (i === 1 ? '🥈' : (i === 2 ? '🥉' : ''));
  });
  return rows;
}

['score:updated', 'putt:updated', 'hole:changed', 'player:added', 'player:removed',
 'player:renamed', 'course:changed', 'settings:changed', 'sync:merged',

// hashchange
// ============================================================
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','');
  const m = h.match(/^join=([^&]+)/);
  if (m) {
    sessionStorage.setItem('gw.pendingJoin', m[1]);
    history.replaceState(null, '', location.pathname + location.search + '#gland');
    activate('gland');
    return;
  }
  const name = h.split('?')[0] || 'home';
  if (screens[name]) activate(name);
});

// ============================================================
// 起動
// ============================================================
function boot() {
  Sync.init();
  State.settings = Store.getSettings();
  const draft = Store.getDraft();
  if (draft && draft.course) {
    try { State.restore(draft); } catch (e) { console.warn('draft restore failed:', e); }
  }
  const h = location.hash.replace('#','');
  const m = h.match(/^join=([^&]+)/);
  if (m) {
    sessionStorage.setItem('gw.pendingJoin', m[1]);
    history.replaceState(null, '', location.pathname + location.search + '#gland');
    activate('gland');
  } else {
    const initial = h.split('?')[0] || 'home';
    activate(screens[initial] ? initial : 'home');
  }
  document.querySelectorAll('nav.footer button[data-route]').forEach(b => {
    b.onclick = () => go(b.dataset.route);
  });
  setTimeout(() => {
    const boot = document.getElementById('boot');
    boot.classList.add('hidden');
    setTimeout(() => boot.remove(), 400);
  }, 300);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
